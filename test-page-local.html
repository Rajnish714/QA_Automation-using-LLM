<!DOCTYPE html>
<html>
<head>
    <title>Slot Game Test</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f0f0f0; }
        .game-area { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto; }
        .balance { font-size: 24px; font-weight: bold; margin: 20px 0; color: #333; }
        .balance-label { font-size: 14px; color: #666; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 4px; margin: 10px 0; }
        .spin-btn { background: #007bff; color: white; }
        .spin-btn:hover { background: #0056b3; }
        .spin-btn:active { background: #003d82; }
        .result { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 4px; display: none; }
        .result.show { display: block; }
    </style>
</head>
<body>
    <div class="game-area">
        <h1>🎰 Slot Game Test</h1>
        <div class="balance-label">Current Balance</div>
        <div class="balance" id="balance">$1,000.00</div>
        
        <button class="spin-btn" onclick="spin()">SPIN</button>
        
        <div class="result" id="result">
            ✓ Spin executed! Balance updated.
        </div>
    </div>

    <script>
        let balance = 1000;
        function spin() {
            balance -= 10;
            if (balance < 0) balance = 1000;
            document.getElementById('balance').textContent = '$' + balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            const result = document.getElementById('result');
            result.classList.add('show');
            setTimeout(() => result.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
